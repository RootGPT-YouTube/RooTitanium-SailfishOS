; qt.conf — isolamento del bundle dai path Qt di sistema (task #2)
;
; PERCHE'. Il Qt6 del bundle e' compilato con qt_prfxpath=/usr, e QT_PLUGIN_PATH
; (run.sh / rootitanium-launch.c) e' ADDITIVO: aggiunge il bundle ai path di
; ricerca, non li sostituisce. Il processo guarda quindi ANCHE in
; /usr/lib64/qt6/plugins — directory inesistente su un device pulito, ma piena
; di plugin Qt6 di Chum su chi ha installato Qt Runner (e ancora presente dopo
; averlo rimosso: `rpm -e qt-runner` non tocca le dipendenze). Dove il bundle ha
; un plugin omonimo vince il bundle; dove NON ce l'ha (es. platforminputcontexts
; ha solo qtvirtualkeyboard, il sistema ha anche maliit) entra quello di sistema,
; compilato contro un altro Qt.
;
; Qt legge questo file accanto all'eseguibile e i path relativi qui dentro sono
; risolti rispetto alla directory dell'eseguibile: SOSTITUISCE i path compilati
; invece di aggiungersi. Deve stare accanto a webengine-smoke (/home/rootitanium
; sul device, scratch/webengine-bundle/ in sviluppo).
;
; Sintomo che ha portato qui: fascia nera in basso alta quanto una tastiera su
; Xperia X10 III / SFOS 5.1.0.11, su due utenti diversi, entrambi con Qt Runner.

[Paths]
Prefix = .
Plugins = plugins
Imports = qml
Qml2Imports = qml
Libraries = lib
LibraryExecutables = libexec
